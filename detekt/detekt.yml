complexity:
  excludes: &excludePatterns
    - '**/generated/**'
  LongParameterList:
    active: false
  TooManyFunctions:
    thresholdInClasses: 20
  LongMethod:
    ignoreAnnotated:
      - 'Composable'

output-reports:
  active: true

exceptions:
  excludes: *excludePatterns
  TooGenericExceptionCaught:
    active: true
    excludes:
      - '**/iosMain/**'
    exceptionNames:
      - 'Error'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignore|expected).*'

naming:
  excludes: *excludePatterns
  FunctionNaming:
    functionPattern: '([A-Za-z][a-zA-Z0-9]*)|(`.*)'

empty-blocks:
  excludes: *excludePatterns
  EmptyFinallyBlock:
    active: false

formatting:
  excludes: *excludePatterns
  CommentSpacing:
    active: false
  ImportOrdering:
    active: false
  ArgumentListWrapping:
    active: false
  NoEmptyFirstLineInMethodBlock:
    active: false
  Filename:
    active: false
  SpacingBetweenDeclarationsWithAnnotations:
    active: false
  FinalNewline:
    active: false

style:
  excludes: *excludePatterns
  ForbiddenComment:
    active: true
    values:
      - 'TODO'
      - 'STOPSHIP'
    allowedPatterns: 'FIXME'
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotated:
      - 'Preview'
      - 'Test'
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'PreviewLightDark'
      - 'LightDarkPreviews'
  NewLineAtEndOfFile:
    active: false
  ThrowsCount:
    max: 10

TwitterCompose:
  excludes: *excludePatterns
  CompositionLocalAllowlist:
    active: true
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ModifierComposable:
    active: true
  ModifierMissing:
    active: true
    ignoreAnnotated:
      - 'Preview'
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  PreviewNaming:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true